<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>请假管理</title>
</head>

<body>
  <div class="container">
    <div class="title1">请假管理</div>
    <!-- 总览 -->
    <div class="card">
      <div class="title2">总览</div>
      <div class="overview-container">
        <div class="overview-item">
          <div id="total" class="overview-data">0</div>
          <div class="overview-label">应到</div>
        </div>
        <div class="overview-item">
          <div id="actual" class="overview-data">0</div>
          <div class="overview-label">实到</div>
        </div>
        <div class="overview-item">
          <div id="leave" class="overview-data">0</div>
          <div class="overview-label">请假</div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="title2">新增请假</div>
      <div class="add-input-container">
        <input class="add-input" id="inputName" placeholder="姓名" maxlength="12" />
        <input class="add-input" id="inputStart" placeholder="开始日期" maxlength="11" />
        <input class="add-input" id="inputEnd" placeholder="结束日期" maxlength="11" />
      </div>
      <input type="button" class="btn-primary" onclick="addLeave()" style="width:100%" value="提交" />
    </div>
    <!-- 请假列表 -->
    <div class="card">
      <div class="title2">请假列表</div>
      <div id="leaveList">
        <div class="leave-item">
          <div class="leave-name">张三</div>
          <div class="leave-date">2026-01-01 => 2026-01-05</div>
          <input type="button" class="btn-danger" onclick="removeLeave('张三')" value="删除" />
        </div>
        <div class="leave-item">
          <div class="leave-name">张三</div>
          <div class="leave-date">2026-01-01 => 2026-01-05</div>
          <input type="button" class="btn-danger" onclick="removeLeave('张三')" value="删除" />
        </div>
      </div>
    </div>
  </div>
  <style>
    body {
      background-color: #f9f9f9;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.7rem;
    }

    .title1 {
      font-size: 2rem;
    }

    .title2 {
      font-size: 1.2rem;
      color: #777;
    }

    .card {
      padding: 1rem;
      border-radius: 0.5rem;
      background-color: #fff;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
      width: 60%;
      min-width: 25rem;
      max-width: 35rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .overview-container {
      display: flex;
      justify-content: space-between;
      width: 100%;
      gap: 1rem;
    }

    .overview-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
      border-radius: 0.5rem;
      background-color: #f9f9f9;
    }

    .overview-data {
      font-weight: bold;
      font-size: 1.5rem;
      color: #333;
    }

    .overview-label {
      font-size: 1rem;
      color: #777;
    }

    .add-input-container {
      display: flex;
      gap: 0.5rem;
    }

    .add-input {
      flex: 1;
      min-width: 5rem;
      padding: 0.5rem;
      border: 1px solid #ccc;
      border-radius: 0.5rem;
    }

    .add-input:focus {
      outline: none;
      border-color: #777;
    }

    .btn-primary {
      padding: 0.5rem;
      border-radius: 0.5rem;
      background: #ce9e04;
      color: #fff;
      border: none;
      cursor: pointer;
    }

    .btn-danger {
      padding: 0.5rem;
      border-radius: 0.5rem;
      background: #dc3545;
      color: #fff;
      border: none;
      cursor: pointer;
    }

    #leaveList {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .leave-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem;
      border-radius: 0.5rem;
      border: 1px solid #eee;
    }
    .leave-name {
      font-weight: bold;
      color: #555;
    }
    .leave-date {
      color: #aaa;
    }
  </style>
</body>

</html>
